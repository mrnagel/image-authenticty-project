


<div class="card">
    <p-fileUpload #fileUpload name="image" url="/api/upload-image/" [customUpload]="true" [multiple]="false" fileLimit=1 accept=".jpg,.png" maxFileSize="5000000" mode="advanced" (uploadHandler)="onUpload($event)">
            <ng-template pTemplate="file" let-file>
                <div class="p-fileupload-file">
                    @if (file.objectURL) {
                        <img [src]="file.objectURL" [alt]="file.name" width="50" />
                    }
                    <span class="p-fileupload-file-name">{{file.name}}</span>
                    <p-badge [value]="job?.status ?? 'pending'" [severity]="badgeSeverity" />
                </div>
            </ng-template>
            <ng-template pTemplate="empty">
                <div class="empty-state">
                    <i class="pi pi-cloud-upload upload-icon"></i>
                    <p class="upload-text">Drag and drop image files here to upload.</p>
                </div>
            </ng-template>
    </p-fileUpload>
</div>

<app-report-viewer [job]="job" />
